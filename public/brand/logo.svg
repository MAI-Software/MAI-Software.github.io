<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" role="img" aria-label="MAI">
  <!-- Recreación vectorial del logo MAI (original raster aportado por el cliente) -->
  <defs>
    <linearGradient id="mai-m" x1="90" y1="30" x2="145" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10C8FC"/>
      <stop offset="0.55" stop-color="#3882FB"/>
      <stop offset="1" stop-color="#6242FC"/>
    </linearGradient>
    <linearGradient id="mai-a" x1="380" y1="114" x2="380" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6242FC"/>
      <stop offset="1" stop-color="#3882FB"/>
    </linearGradient>
  </defs>
  <g>
    <!-- M -->
    <polygon fill="#0B1220" points="20,30 58,30 58,190 20,190"/>
    <polygon fill="url(#mai-m)" points="58,30 96,30 159,190 121,190"/>
    <polygon fill="#0B1220" points="184,30 222,30 159,190 121,190"/>
    <polygon fill="#0B1220" points="222,30 260,30 260,190 222,190"/>
    <!-- A (sin barra, contador abierto) -->
    <path fill="#0B1220" fill-rule="evenodd" d="M380 30 L460 190 L300 190 Z M380 92 L429 190 L331 190 Z"/>
    <polygon fill="url(#mai-a)" points="380,114 415,184 345,184"/>
    <!-- I -->
    <polygon fill="#10C8FC" points="500,30 538,30 538,58 500,86"/>
    <polygon fill="#0B1220" points="500,96 538,68 538,190 500,190"/>
  </g>
</svg>
